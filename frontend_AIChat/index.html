<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <!-- 推荐的 viewport 与 renderer 设置，兼容移动设备与 WebKit 渲染器 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" />
    <meta name="renderer" content="webkit" />
    <title>OpenVINO™ GenAI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fira-code@6.2.0/distr/fira_code.css">
    <!-- MDUI (Material Design UI) - 使用官方 unpkg 引入 -->
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <!-- Material Symbols / Icons and Roboto for Material typography -->
    <!-- 如果使用组件的 icon 属性，可替换为其他图标 CSS（如 material-icons 或 iconfont） -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <!-- MDUI JS (global mdui) - 使用官方 unpkg 版本 -->
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
